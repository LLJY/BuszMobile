name: busz_mobile
description: "BuszMobile - Reference implementation for MyBusz gRPC endpoints"
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.2.1

  # Connect-RPC (gRPC-Web protocol for Cloudflare compatibility)
  connectrpc: ^1.0.0
  protobuf: ^3.1.0
  fixnum: ^1.1.0

  # Crypto (ECDSA P-256 signing for nonce-challenge auth)
  pointycastle: ^4.0.0

  # Routing
  go_router: ^17.1.0

  # Map
  flutter_map: ^8.2.2
  latlong2: ^0.9.1

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2

  # Utilities
  intl: ^0.20.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
