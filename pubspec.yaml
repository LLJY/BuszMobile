name: busz_mobile
description: "BuszMobile - Reference implementation for MyBusz gRPC endpoints"
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2

  # Connect-RPC (gRPC-Web protocol for Cloudflare compatibility)
  connectrpc: ^1.0.0
  protobuf: ^3.1.0
  fixnum: ^1.1.0

  # Crypto (ECDSA P-256 signing for nonce-challenge auth)
  pointycastle: ^4.0.0

  # Routing
  go_router: ^17.1.0

  # Map
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  flutter_map_cache: ^2.0.0
  http_cache_core: ^1.1.0
  http_cache_file_store: ^2.0.0
  dio: ^5.2.0
  dio_cache_interceptor: ^4.0.5

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2

  # Local Storage
  shared_preferences: ^2.5.4

  # GPS Location
  geolocator: ^14.0.2

  # Utilities
  intl: ^0.20.1
  shimmer: ^3.0.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.3
  build_runner:
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "icon.png"
  adaptive_icon_background: "#102447"
  adaptive_icon_foreground: "icon.png"

flutter:
  uses-material-design: true
