name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# Repository Secrets (optional — builds succeed without them):
#   FRONTLINE_PRIVATE_KEY  - ECDSA P-256 PEM for nonce-challenge auth
#   AUTH_BASE_URL          - Identity service URL
#   FRONTLINE_CLIENT_ID    - OAuth2 client ID
#
# When set, artifacts can connect to the live API.
# When missing, the app starts with a "no credentials" warning (UI-only).
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ===========================================================================
  # Tests
  # ===========================================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos --no-fatal-warnings
      - run: flutter test

  # ===========================================================================
  # Android APK
  # ===========================================================================
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Generate .env.json
        if: env.FRONTLINE_PRIVATE_KEY != ''
        env:
          FRONTLINE_PRIVATE_KEY: ${{ secrets.FRONTLINE_PRIVATE_KEY }}
          AUTH_BASE_URL: ${{ secrets.AUTH_BASE_URL }}
          FRONTLINE_CLIENT_ID: ${{ secrets.FRONTLINE_CLIENT_ID }}
        run: |
          jq -n \
            --arg key "$FRONTLINE_PRIVATE_KEY" \
            --arg url "$AUTH_BASE_URL" \
            --arg id  "$FRONTLINE_CLIENT_ID" \
            '{FRONTLINE_PRIVATE_KEY: ($key | gsub("\n"; "\\n")), AUTH_BASE_URL: $url, FRONTLINE_CLIENT_ID: $id}' \
            > .env.json

      - name: Build APK (with credentials)
        if: hashFiles('.env.json') != ''
        run: flutter build apk --release --dart-define-from-file=.env.json

      - name: Build APK (without credentials)
        if: hashFiles('.env.json') == ''
        run: flutter build apk --release

      - name: Clean up secrets
        if: always()
        run: rm -f .env.json

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  # ===========================================================================
  # Linux AppImage
  # ===========================================================================
  linux:
    name: Linux AppImage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev libfuse2

      - run: flutter pub get

      - name: Generate .env.json
        if: env.FRONTLINE_PRIVATE_KEY != ''
        env:
          FRONTLINE_PRIVATE_KEY: ${{ secrets.FRONTLINE_PRIVATE_KEY }}
          AUTH_BASE_URL: ${{ secrets.AUTH_BASE_URL }}
          FRONTLINE_CLIENT_ID: ${{ secrets.FRONTLINE_CLIENT_ID }}
        run: |
          jq -n \
            --arg key "$FRONTLINE_PRIVATE_KEY" \
            --arg url "$AUTH_BASE_URL" \
            --arg id  "$FRONTLINE_CLIENT_ID" \
            '{FRONTLINE_PRIVATE_KEY: ($key | gsub("\n"; "\\n")), AUTH_BASE_URL: $url, FRONTLINE_CLIENT_ID: $id}' \
            > .env.json

      - name: Build Linux (with credentials)
        if: hashFiles('.env.json') != ''
        run: flutter build linux --release --dart-define-from-file=.env.json

      - name: Build Linux (without credentials)
        if: hashFiles('.env.json') == ''
        run: flutter build linux --release

      - name: Clean up secrets
        if: always()
        run: rm -f .env.json

      - name: Package AppImage
        run: |
          set -e

          # Download appimagetool
          wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -O appimagetool
          chmod +x appimagetool

          BUNDLE=build/linux/x64/release/bundle
          APPDIR=BuszMobile.AppDir

          # Create AppDir from Flutter bundle
          mkdir -p "$APPDIR/usr/bin"
          cp -r "$BUNDLE"/* "$APPDIR/usr/bin/"

          # AppRun launcher
          cat > "$APPDIR/AppRun" << 'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          export LD_LIBRARY_PATH="$HERE/usr/bin/lib:$LD_LIBRARY_PATH"
          exec "$HERE/usr/bin/mybusz_debug" "$@"
          APPRUN
          chmod +x "$APPDIR/AppRun"

          # Desktop entry
          cat > "$APPDIR/busz_mobile.desktop" << 'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=BuszMobile
          Comment=Real-time bus arrivals for Johor Bahru
          Exec=mybusz_debug
          Icon=busz_mobile
          Categories=Utility;
          DESKTOP

          # Icon (use the launcher icon from Android assets)
          cp android/app/src/main/res/mipmap-xxxhdpi/launcher_icon.png \
            "$APPDIR/busz_mobile.png"

          # Build AppImage
          ARCH=x86_64 ./appimagetool "$APPDIR"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: "*.AppImage"

  # ===========================================================================
  # macOS App
  # ===========================================================================
  macos:
    name: macOS App
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Generate .env.json
        if: env.FRONTLINE_PRIVATE_KEY != ''
        env:
          FRONTLINE_PRIVATE_KEY: ${{ secrets.FRONTLINE_PRIVATE_KEY }}
          AUTH_BASE_URL: ${{ secrets.AUTH_BASE_URL }}
          FRONTLINE_CLIENT_ID: ${{ secrets.FRONTLINE_CLIENT_ID }}
        run: |
          jq -n \
            --arg key "$FRONTLINE_PRIVATE_KEY" \
            --arg url "$AUTH_BASE_URL" \
            --arg id  "$FRONTLINE_CLIENT_ID" \
            '{FRONTLINE_PRIVATE_KEY: ($key | gsub("\n"; "\\n")), AUTH_BASE_URL: $url, FRONTLINE_CLIENT_ID: $id}' \
            > .env.json

      - name: Build macOS (with credentials)
        if: hashFiles('.env.json') != ''
        run: flutter build macos --release --dart-define-from-file=.env.json

      - name: Build macOS (without credentials)
        if: hashFiles('.env.json') == ''
        run: flutter build macos --release

      - name: Clean up secrets
        if: always()
        run: rm -f .env.json

      - name: Zip macOS app bundle
        run: |
          cd build/macos/Build/Products/Release
          zip -r -y "$GITHUB_WORKSPACE/BuszMobile-macOS.zip" "mybusz_debug.app"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: BuszMobile-macOS.zip

  # ===========================================================================
  # Publish Release
  # ===========================================================================
  release:
    name: Publish Release
    needs: [test, android, linux, macos]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/android-apk/app-release.apk    release/BuszMobile-Android.apk
          cp artifacts/linux-appimage/*.AppImage        release/BuszMobile-Linux.AppImage
          cp artifacts/macos-app/BuszMobile-macOS.zip   release/BuszMobile-macOS.zip

      - name: Generate release tag and notes
        id: meta
        run: |
          TAG="v0.1.0-build.$(date -u +%Y%m%d.%H%M)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          # Collect commits since last tag (or all if no tags yet)
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log "$LAST_TAG"..HEAD --oneline --no-merges)
          else
            COMMITS=$(git log --oneline --no-merges -20)
          fi

          cat > release_notes.md << EOF
          ## BuszMobile $TAG

          **Built from** [\`${GITHUB_SHA::7}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})

          ### Downloads
          | Platform | File |
          |----------|------|
          | Android | \`BuszMobile-Android.apk\` |
          | Linux | \`BuszMobile-Linux.AppImage\` |
          | macOS | \`BuszMobile-macOS.zip\` |

          ### Changes
          \`\`\`
          $COMMITS
          \`\`\`
          EOF

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.meta.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --title "BuszMobile ${{ steps.meta.outputs.tag }}" \
            --notes-file release_notes.md \
            release/BuszMobile-Android.apk \
            release/BuszMobile-Linux.AppImage \
            release/BuszMobile-macOS.zip
