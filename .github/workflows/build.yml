name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# Repository Secrets (optional — builds succeed without them):
#   FRONTLINE_PRIVATE_KEY  - ECDSA P-256 PEM for nonce-challenge auth
#   AUTH_BASE_URL          - Identity service URL
#   FRONTLINE_CLIENT_ID    - OAuth2 client ID
#
# When set, artifacts can connect to the live API.
# When missing, the app starts with a "no credentials" warning (UI-only).
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ===========================================================================
  # Android APK
  # ===========================================================================
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Generate .env.json
        if: env.FRONTLINE_PRIVATE_KEY != ''
        env:
          FRONTLINE_PRIVATE_KEY: ${{ secrets.FRONTLINE_PRIVATE_KEY }}
          AUTH_BASE_URL: ${{ secrets.AUTH_BASE_URL }}
          FRONTLINE_CLIENT_ID: ${{ secrets.FRONTLINE_CLIENT_ID }}
        run: |
          cat > .env.json << EOF
          {
            "FRONTLINE_PRIVATE_KEY": "$FRONTLINE_PRIVATE_KEY",
            "AUTH_BASE_URL": "$AUTH_BASE_URL",
            "FRONTLINE_CLIENT_ID": "$FRONTLINE_CLIENT_ID"
          }
          EOF

      - name: Build APK (with credentials)
        if: hashFiles('.env.json') != ''
        run: flutter build apk --release --dart-define-from-file=.env.json

      - name: Build APK (without credentials)
        if: hashFiles('.env.json') == ''
        run: flutter build apk --release

      - name: Clean up secrets
        if: always()
        run: rm -f .env.json

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  # ===========================================================================
  # Linux AppImage
  # ===========================================================================
  linux:
    name: Linux AppImage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev libfuse2

      - run: flutter pub get

      - name: Generate .env.json
        if: env.FRONTLINE_PRIVATE_KEY != ''
        env:
          FRONTLINE_PRIVATE_KEY: ${{ secrets.FRONTLINE_PRIVATE_KEY }}
          AUTH_BASE_URL: ${{ secrets.AUTH_BASE_URL }}
          FRONTLINE_CLIENT_ID: ${{ secrets.FRONTLINE_CLIENT_ID }}
        run: |
          cat > .env.json << EOF
          {
            "FRONTLINE_PRIVATE_KEY": "$FRONTLINE_PRIVATE_KEY",
            "AUTH_BASE_URL": "$AUTH_BASE_URL",
            "FRONTLINE_CLIENT_ID": "$FRONTLINE_CLIENT_ID"
          }
          EOF

      - name: Build Linux (with credentials)
        if: hashFiles('.env.json') != ''
        run: flutter build linux --release --dart-define-from-file=.env.json

      - name: Build Linux (without credentials)
        if: hashFiles('.env.json') == ''
        run: flutter build linux --release

      - name: Clean up secrets
        if: always()
        run: rm -f .env.json

      - name: Package AppImage
        run: |
          set -e

          # Download appimagetool
          wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -O appimagetool
          chmod +x appimagetool

          BUNDLE=build/linux/x64/release/bundle
          APPDIR=BuszMobile.AppDir

          # Create AppDir from Flutter bundle
          mkdir -p "$APPDIR/usr/bin"
          cp -r "$BUNDLE"/* "$APPDIR/usr/bin/"

          # AppRun launcher
          cat > "$APPDIR/AppRun" << 'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          export LD_LIBRARY_PATH="$HERE/usr/bin/lib:$LD_LIBRARY_PATH"
          exec "$HERE/usr/bin/mybusz_debug" "$@"
          APPRUN
          chmod +x "$APPDIR/AppRun"

          # Desktop entry
          cat > "$APPDIR/busz_mobile.desktop" << 'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=BuszMobile
          Comment=Real-time bus arrivals for Johor Bahru
          Exec=mybusz_debug
          Icon=busz_mobile
          Categories=Utility;
          DESKTOP

          # Icon (use the launcher icon from Android assets)
          cp android/app/src/main/res/mipmap-xxxhdpi/launcher_icon.png \
            "$APPDIR/busz_mobile.png"

          # Build AppImage
          ARCH=x86_64 ./appimagetool "$APPDIR"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: "*.AppImage"

  # ===========================================================================
  # macOS App
  # ===========================================================================
  macos:
    name: macOS App
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Generate .env.json
        if: env.FRONTLINE_PRIVATE_KEY != ''
        env:
          FRONTLINE_PRIVATE_KEY: ${{ secrets.FRONTLINE_PRIVATE_KEY }}
          AUTH_BASE_URL: ${{ secrets.AUTH_BASE_URL }}
          FRONTLINE_CLIENT_ID: ${{ secrets.FRONTLINE_CLIENT_ID }}
        run: |
          cat > .env.json << EOF
          {
            "FRONTLINE_PRIVATE_KEY": "$FRONTLINE_PRIVATE_KEY",
            "AUTH_BASE_URL": "$AUTH_BASE_URL",
            "FRONTLINE_CLIENT_ID": "$FRONTLINE_CLIENT_ID"
          }
          EOF

      - name: Build macOS (with credentials)
        if: hashFiles('.env.json') != ''
        run: flutter build macos --release --no-codesign --dart-define-from-file=.env.json

      - name: Build macOS (without credentials)
        if: hashFiles('.env.json') == ''
        run: flutter build macos --release --no-codesign

      - name: Clean up secrets
        if: always()
        run: rm -f .env.json

      - name: Zip macOS app bundle
        run: |
          cd build/macos/Build/Products/Release
          zip -r -y "$GITHUB_WORKSPACE/BuszMobile-macOS.zip" "mybusz_debug.app"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: BuszMobile-macOS.zip
