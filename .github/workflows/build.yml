name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Android APK
  # ===========================================================================
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  # ===========================================================================
  # Linux AppImage
  # ===========================================================================
  linux:
    name: Linux AppImage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev libfuse2

      - run: flutter pub get
      - run: flutter build linux --release

      - name: Package AppImage
        run: |
          set -e

          # Download appimagetool
          wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -O appimagetool
          chmod +x appimagetool

          BUNDLE=build/linux/x64/release/bundle
          APPDIR=BuszMobile.AppDir

          # Create AppDir from Flutter bundle
          mkdir -p "$APPDIR/usr/bin"
          cp -r "$BUNDLE"/* "$APPDIR/usr/bin/"

          # AppRun launcher
          cat > "$APPDIR/AppRun" << 'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          export LD_LIBRARY_PATH="$HERE/usr/bin/lib:$LD_LIBRARY_PATH"
          exec "$HERE/usr/bin/mybusz_debug" "$@"
          APPRUN
          chmod +x "$APPDIR/AppRun"

          # Desktop entry
          cat > "$APPDIR/busz_mobile.desktop" << 'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=BuszMobile
          Comment=Real-time bus arrivals for Johor Bahru
          Exec=mybusz_debug
          Icon=busz_mobile
          Categories=Utility;
          DESKTOP

          # Icon (use the launcher icon from Android assets)
          cp android/app/src/main/res/mipmap-xxxhdpi/launcher_icon.png \
            "$APPDIR/busz_mobile.png"

          # Build AppImage
          ARCH=x86_64 ./appimagetool "$APPDIR"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: "*.AppImage"

  # ===========================================================================
  # macOS App
  # ===========================================================================
  macos:
    name: macOS App
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build macos --release --no-codesign

      - name: Zip macOS app bundle
        run: |
          cd build/macos/Build/Products/Release
          zip -r -y "$GITHUB_WORKSPACE/BuszMobile-macOS.zip" "mybusz_debug.app"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: BuszMobile-macOS.zip
